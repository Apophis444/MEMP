<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>MEMP Tactical Map</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/milsymbol@2.2.0/dist/milsymbol.min.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-draw/v1.5.0/mapbox-gl-draw.css" rel="stylesheet" />

<style>
  :root {
    --bg-deep:    #0a0c0f;
    --bg-panel:   #0f1318;
    --bg-card:    #161b22;
    --border:     #1f2937;
    --border-lit: #2d3f52;
    --accent:     #00e5ff;
    --accent-dim: rgba(0,229,255,0.12);
    --accent-glow:rgba(0,229,255,0.35);
    --danger:     #ff3b3b;
    --text-hi:    #e8edf2;
    --text-mid:   #8a9ab0;
    --text-lo:    #3d4f62;
    --font-mono:  'Share Tech Mono', monospace;
    --font-ui:    'Barlow Condensed', sans-serif;
    --radius:     6px;
    --panel-w:    210px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--bg-deep);
    color: var(--text-hi);
    overflow: hidden;
  }

  #map { width: 100%; height: 100vh; }

  #map::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
    z-index: 1;
  }

  .corner {
    position: absolute;
    width: 22px; height: 22px;
    z-index: 3;
    pointer-events: none;
  }
  .corner-tl { top:10px; left:10px;   border-top:2px solid var(--accent); border-left:2px solid var(--accent); }
  .corner-tr { top:10px; right:10px;  border-top:2px solid var(--accent); border-right:2px solid var(--accent); }
  .corner-bl { bottom:10px; left:10px;  border-bottom:2px solid var(--accent); border-left:2px solid var(--accent); }
  .corner-br { bottom:10px; right:10px; border-bottom:2px solid var(--accent); border-right:2px solid var(--accent); }

  #header {
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-panel);
    border: 1px solid var(--border-lit);
    border-radius: var(--radius);
    padding: 0 14px;
    height: 48px;
    box-shadow: 0 0 0 1px rgba(0,229,255,0.06), 0 8px 32px rgba(0,0,0,0.6);
  }

  #header-title {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
    padding-right: 14px;
    margin-right: 4px;
    border-right: 1px solid var(--border);
  }

  .divider-v {
    width: 1px; height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  .tool-btn {
    position: relative;
    width: 38px; height: 38px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-card);
    color: var(--text-mid);
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s ease;
    font-family: var(--font-ui);
  }
  .tool-btn:hover { border-color:var(--border-lit); color:var(--text-hi); background:#1d242e; }
  .tool-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 10px var(--accent-glow);
  }
  .tool-btn.danger:hover { border-color:var(--danger); color:var(--danger); background:rgba(255,59,59,0.1); }

  .tool-btn[data-tip]::after {
    content: attr(data-tip);
    position: absolute;
    bottom: -28px; left: 50%;
    transform: translateX(-50%);
    background: var(--bg-panel);
    border: 1px solid var(--border-lit);
    color: var(--text-hi);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.08em;
    white-space: nowrap;
    padding: 3px 7px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
    z-index: 99;
  }
  .tool-btn[data-tip]:hover::after { opacity: 1; }

  #sidepanel {
    position: absolute;
    top: 80px; left: 16px;
    width: var(--panel-w);
    z-index: 4;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .panel-block {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .panel-block:hover { border-color: var(--border-lit); }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-card);
  }
  .panel-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--text-mid);
    text-transform: uppercase;
  }
  .panel-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    flex-shrink: 0;
  }
  .panel-body { padding: 10px; }

  #colorGrid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
  }
  .color-swatch {
    height: 22px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .color-swatch:hover { transform: scale(1.12); }
  .color-swatch.active { border-color:white; box-shadow:0 0 8px currentColor; transform:scale(1.08); }

  #symbolGrid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
  }
  #symbolGrid button {
    height: 42px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 4px;
  }
  #symbolGrid button:hover { border-color:var(--border-lit); background:#1a212c; }
  #symbolGrid button.active { border-color:var(--accent); background:var(--accent-dim); box-shadow:0 0 8px var(--accent-glow); }
  #symbolGrid button svg { width:28px; height:28px; }

  #statusbar {
    position: absolute;
    bottom: 18px; left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 16px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #statusbar .status-item { display:flex; align-items:center; gap:6px; }
  #statusbar .status-sep { color:var(--text-lo); }
  #status-mode { color:var(--accent); text-transform:uppercase; }

  #hint {
    position: absolute;
    top: 76px; left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    background: var(--bg-panel);
    border: 1px solid var(--border-lit);
    border-radius: var(--radius);
    padding: 5px 14px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-mid);
    letter-spacing: 0.08em;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  #hint.visible { opacity: 1; }

  .symbol-wrapper { position:absolute; transform-origin:center; cursor:grab; }
  .symbol-wrapper:active { cursor:grabbing; }
  .symbol-inner { transform:translate(-50%,-50%); filter:drop-shadow(0 0 4px rgba(0,0,0,0.8)); }

  @keyframes place-pulse {
    0%   { transform:translate(-50%,-50%) scale(0.7); opacity:0.6; }
    60%  { transform:translate(-50%,-50%) scale(1.15); opacity:1; }
    100% { transform:translate(-50%,-50%) scale(1); opacity:1; }
  }
  .symbol-inner.just-placed { animation:place-pulse 0.25s ease-out; }

  .mapboxgl-ctrl-bottom-right { display:none; }
  .mapboxgl-ctrl-bottom-left  { display:none; }
</style>
</head>
<body>

<div id="map"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div id="header">
  <span id="header-title">◈ TACT/OPS</span>
  <button class="tool-btn" id="placeBtn"   onclick="togglePlacementMode()" data-tip="PLACE UNIT">🪖</button>
  <button class="tool-btn" id="arrowBtn"   onclick="startArrowMode()"      data-tip="ARROW">➡️</button>
  <button class="tool-btn" id="polygonBtn" onclick="startPolygonMode()"    data-tip="ZONE">⬡</button>
  <div class="divider-v"></div>
  <button class="tool-btn danger"          onclick="clearMap()"            data-tip="CLEAR ALL">🗑️</button>
</div>

<div id="hint"></div>

<div id="sidepanel">
  <div class="panel-block">
    <div class="panel-header"><div class="panel-dot"></div><span class="panel-label">Color</span></div>
    <div class="panel-body"><div id="colorGrid"></div></div>
  </div>
  <div class="panel-block">
    <div class="panel-header"><div class="panel-dot"></div><span class="panel-label">Unit Type</span></div>
    <div class="panel-body"><div id="symbolGrid"></div></div>
  </div>
</div>

<div id="statusbar">
  <div class="status-item">MODE <span id="status-mode">IDLE</span></div>
  <span class="status-sep">|</span>
  <div class="status-item"><span id="status-coords">-- . ---- , -- . ----</span></div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiYXBvcGhpczQ0IiwiYSI6ImNtbzJ3eHhzNDB0dGwycXF3Nnp1OXRzdHQifQ.2SHo3BkuFOP40nVSVGnxaQ';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/satellite-streets-v12',
  center: [-74.5, 40],
  zoom: 9
});

map.doubleClickZoom.disable();

let currentColor = "#00e5ff";
let currentSIDC  = "SNGPUCI----K";
let mode         = "none";
let arrowPoints  = [];
let arrows       = [];
let polyPoints   = [];
let polygons     = [];

function showHint(msg) {
  const el = document.getElementById('hint');
  el.textContent = msg;
  el.classList.add('visible');
}
function hideHint() {
  document.getElementById('hint').classList.remove('visible');
}

function setMode(m) {
  mode = m;
  document.getElementById('status-mode').textContent = m === 'none' ? 'IDLE' : m.toUpperCase();
}

map.on('mousemove', e => {
  document.getElementById('status-coords').textContent =
    `${e.lngLat.lat.toFixed(4)}° N  ${e.lngLat.lng.toFixed(4)}° W`;

  if (mode === 'arrow' && arrowPoints.length > 0) {
    const pts = [...arrowPoints, [e.lngLat.lng, e.lngLat.lat]];
    map.getSource('preview')?.setData({ type:'Feature', geometry:{type:'LineString', coordinates:pts} });
  }

  if (mode === 'polygon' && polyPoints.length > 0) {
    const pts = [...polyPoints, [e.lngLat.lng, e.lngLat.lat], polyPoints[0]];
    map.getSource('poly-preview')?.setData({ type:'Feature', geometry:{type:'LineString', coordinates:pts} });
  }
});

function setActiveButton(id) {
  document.querySelectorAll(".tool-btn").forEach(b => b.classList.remove("active"));
  if (id) document.getElementById(id)?.classList.add("active");
}

const colors = ["#00e5ff","#ff3b3b","#39ff14","#ffdd00","#ff6b00","#ffffff"];

function buildColors() {
  const grid = document.getElementById("colorGrid");
  colors.forEach((c, i) => {
    const el = document.createElement("div");
    el.className = "color-swatch";
    el.style.background = c;
    el.onclick = () => {
      currentColor = c;
      document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("active"));
      el.classList.add("active");
    };
    if (i === 0) el.classList.add("active");
    grid.appendChild(el);
  });
}

const symbols = [
  { sidc:"SNGPUCI----K" },
  { sidc:"SNGPUCA----K" },
  { sidc:"SNGPUCM----K" },
  { sidc:"SNGPUCAT---K" },
  { sidc:"SNGPUAV----K" },
  { sidc:"SNGPUCF----K" },
  { sidc:"SNGPUSM----K" },
  { sidc:"SFGPUCIL---K" }
];

function buildSymbols() {
  const grid = document.getElementById("symbolGrid");
  symbols.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.innerHTML = new ms.Symbol(s.sidc, { size: 22 }).asSVG();
    btn.onclick = () => {
      currentSIDC = s.sidc;
      document.querySelectorAll("#symbolGrid button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
    };
    if (i === 0) btn.classList.add("active");
    grid.appendChild(btn);
  });
}

map.on('load', () => {
  buildColors();
  buildSymbols();

  map.addSource('preview', { type:'geojson', data:{type:'Feature', geometry:{type:'LineString', coordinates:[]}} });
  map.addLayer({ id:'preview', type:'line', source:'preview',
    paint:{ 'line-color':'#ffffff', 'line-width':2, 'line-dasharray':[3,3], 'line-opacity':0.6 }
  });

  map.addSource('poly-preview', { type:'geojson', data:{type:'Feature', geometry:{type:'LineString', coordinates:[]}} });
  map.addLayer({ id:'poly-preview', type:'line', source:'poly-preview',
    paint:{ 'line-color':'#ffffff', 'line-width':2, 'line-dasharray':[3,3], 'line-opacity':0.6 }
  });
});

function buildSolidArrow(points) {
  const zoom = map.getZoom();
  const size = 0.004 * Math.pow(2, 10 - zoom);

  const p1 = points[points.length - 2];
  const p2 = points[points.length - 1];
  const angle = Math.atan2(p2[1]-p1[1], p2[0]-p1[0]);

  const pullback = size * 0.85;
  const lineEnd = [
    p2[0] - pullback * Math.cos(angle),
    p2[1] - pullback * Math.sin(angle)
  ];

  const trimmedPoints = [...points.slice(0, -1), lineEnd];
  const left  = [ p2[0] - size * Math.cos(angle - Math.PI/6), p2[1] - size * Math.sin(angle - Math.PI/6) ];
  const right = [ p2[0] - size * Math.cos(angle + Math.PI/6), p2[1] - size * Math.sin(angle + Math.PI/6) ];

  return [
    { type:'Feature', geometry:{type:'LineString', coordinates:trimmedPoints}, properties:{type:'line'} },
    { type:'Feature', geometry:{type:'Polygon',    coordinates:[[left, p2, right, left]]}, properties:{type:'head'} }
  ];
}

map.on('click', e => {
  const pt = [e.lngLat.lng, e.lngLat.lat];
  if (mode === "arrow")   { arrowPoints.push(pt); return; }
  if (mode === "polygon") { polyPoints.push(pt);  return; }
  if (mode === "place")   { createUnit(e.lngLat); }
});

map.on('dblclick', e => {
  if (mode === "arrow") {
    arrowPoints.push([e.lngLat.lng, e.lngLat.lat]);
    if (arrowPoints.length >= 2) commitArrow();
    return;
  }
  if (mode === "polygon") {
    if (polyPoints.length >= 3) commitPolygon();
    return;
  }
});

function commitArrow() {
  const id = "arrow-" + Date.now();
  const features = buildSolidArrow(arrowPoints);

  map.addSource(id, { type:'geojson', data:{type:'FeatureCollection', features} });
  map.addLayer({
    id: id+"-line", type:'line', source:id,
    filter: ['==',['get','type'],'line'],
    paint: { 'line-color':currentColor, 'line-width':4, 'line-cap':'round', 'line-join':'round' }
  });
  map.addLayer({
    id: id+"-head", type:'fill', source:id,
    filter: ['==',['get','type'],'head'],
    paint: { 'fill-color':currentColor }
  });

  arrows.push(id);
  arrowPoints = [];
  map.getSource('preview').setData({ type:'Feature', geometry:{type:'LineString', coordinates:[]} });
  setMode("none"); setActiveButton(null); hideHint();
}

function commitPolygon() {
  const id = "poly-" + Date.now();
  const ring = [...polyPoints, polyPoints[0]];

  map.addSource(id, {
    type:'geojson',
    data:{ type:'Feature', geometry:{ type:'Polygon', coordinates:[ring] } }
  });
  map.addLayer({
    id: id+"-fill", type:'fill', source:id,
    paint: { 'fill-color':currentColor, 'fill-opacity':0.15 }
  });
  map.addLayer({
    id: id+"-outline", type:'line', source:id,
    paint: { 'line-color':currentColor, 'line-width':2, 'line-opacity':0.9 }
  });

  polygons.push(id);
  polyPoints = [];
  map.getSource('poly-preview').setData({ type:'Feature', geometry:{type:'LineString', coordinates:[]} });
  setMode("none"); setActiveButton(null); hideHint();
}

function startArrowMode() {
  if (mode === "arrow") {
    setMode("none"); setActiveButton(null); hideHint();
    arrowPoints = [];
    map.getSource('preview')?.setData({ type:'Feature', geometry:{type:'LineString', coordinates:[]} });
    return;
  }
  arrowPoints = [];
  setMode("arrow");
  setActiveButton("arrowBtn");
  showHint("CLICK to add points  ·  DOUBLE-CLICK to finish arrow");
}

function startPolygonMode() {
  if (mode === "polygon") {
    setMode("none"); setActiveButton(null); hideHint();
    polyPoints = [];
    map.getSource('poly-preview')?.setData({ type:'Feature', geometry:{type:'LineString', coordinates:[]} });
    return;
  }
  polyPoints = [];
  setMode("polygon");
  setActiveButton("polygonBtn");
  showHint("CLICK to add corners  ·  DOUBLE-CLICK to close zone  (min 3 points)");
}

function togglePlacementMode() {
  if (mode === "place") {
    setMode("none"); setActiveButton(null); hideHint();
  } else {
    setMode("place");
    setActiveButton("placeBtn");
    showHint("CLICK on map to place unit");
  }
}

function clearMap() {
  arrows.forEach(id => {
    if (map.getLayer(id+"-line")) map.removeLayer(id+"-line");
    if (map.getLayer(id+"-head")) map.removeLayer(id+"-head");
    if (map.getSource(id))        map.removeSource(id);
  });
  polygons.forEach(id => {
    if (map.getLayer(id+"-fill"))    map.removeLayer(id+"-fill");
    if (map.getLayer(id+"-outline")) map.removeLayer(id+"-outline");
    if (map.getSource(id))           map.removeSource(id);
  });
  arrows = []; polygons = []; arrowPoints = []; polyPoints = [];
  document.querySelectorAll('.symbol-wrapper').forEach(el => el.remove());
  map.getSource('preview')?.setData({ type:'Feature', geometry:{type:'LineString', coordinates:[]} });
  map.getSource('poly-preview')?.setData({ type:'Feature', geometry:{type:'LineString', coordinates:[]} });
  setMode("none"); setActiveButton(null); hideHint();
}

function createUnit(lngLat) {
  const sym = new ms.Symbol(currentSIDC, {
    size: 28,
    frameColor: currentColor,
    fillColor: currentColor + "BB"
  });

  const el = document.createElement("div");
  el.className = "symbol-wrapper";
  el.innerHTML = `<div class="symbol-inner just-placed">${sym.asSVG()}</div>`;

  const inner = el.querySelector('.symbol-inner');
  inner.addEventListener('animationend', () => inner.classList.remove('just-placed'));

  new mapboxgl.Marker({ element: el, draggable: true })
    .setLngLat(lngLat)
    .addTo(map);
}
</script>
</body>
</html>
